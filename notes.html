<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PageNoter — All notes</title>
  <link rel="stylesheet" href="notes.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>All notes</h1>
      <input id="search" type="search" placeholder="Search by URL or text..." autocomplete="off" />
    </header>

    <p id="count" class="count"></p>
    <div id="list" class="list"></div>
    <p id="empty" class="empty" hidden></p>
  </div>

  <script src="theme.js"></script>
  <script src="store.js"></script>
  <script src="notes.js"></script>
</body>
</html>
