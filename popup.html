<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="title-row">
      <h1>PageNoter</h1>
      <button id="settings-toggle" class="icon-btn" title="Settings" aria-label="Settings" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg>
      </button>
    </div>
    <p id="page-url" title=""></p>
  </header>

  <section id="settings" class="settings" hidden>
    <span class="settings-label">Theme</span>
    <div id="themes" class="theme-row" aria-label="Color theme"></div>
  </section>

  <div class="scope-row" role="group" aria-label="Note scope">
    <button class="scope-btn" data-scope="page">This page</button>
    <button class="scope-btn" data-scope="site">Whole site</button>
  </div>

  <textarea id="note" placeholder="Write a note for this page..."></textarea>

  <footer>
    <span id="status"></span>
    <button id="clear">Clear</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
